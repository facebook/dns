name: lint_dnswatch
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: "Install deps"
        run: sudo apt-get update; sudo apt-get install -y make clang  gcc-multilib libsystemd-dev libcap-dev libpcap-dev
      - name: "Install libbpf-1"
        run: sudo bash .github/scripts/install_libbpf1.sh
      - name: Install bpftool
        run: |
          # Map uname -m output to the asset arch naming used by libbpf/bpftool releases
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  ARCH=amd64 ;;
            aarch64) ARCH=arm64 ;;
            *)        echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac

          BPFTOOL_VERSION=v7.4.0
          URL="https://github.com/libbpf/bpftool/releases/download/${BPFTOOL_VERSION}/bpftool-${BPFTOOL_VERSION}-${ARCH}.tar.gz"
          echo "Downloading bpftool from: $URL"

          curl -fsSL "$URL" -o bpftool.tar.gz
          tar -xzf bpftool.tar.gz
          sudo mv bpftool /usr/local/bin/bpftool
          sudo chmod +x /usr/local/bin/bpftool
          bpftool version
      - name: "Build all"
        run: cd dnswatch; git submodule update --init --recursive; make
      - name: "Run linter"
        run: cd dnswatch; git submodule update --init --recursive; make lint
